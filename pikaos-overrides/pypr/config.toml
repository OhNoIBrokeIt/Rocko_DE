[pyprland]
    plugins = ["scratchpads"]

[pyprland.variables]
    term_with_class = "kitty --class"

[scratchpads.console]
    animation = "fromTop"
    class     = "console-dropdown"
    command   = "/usr/bin/kitty --class console-dropdown"
    size      = "75% 60%"
    max_size  = "90% 100%"
    margin    = 10
    process_tracking = false

[scratchpads.files]
    animation  = "fromTop"
    class      = "files-dropdown"
    command    = "/usr/bin/kitty --class files-dropdown -e yazi"
    size       = "70% 65%"
    max_size   = "90% 100%"
    margin     = 10
    lazy       = true
    process_tracking = false
