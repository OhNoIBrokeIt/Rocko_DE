# ============================================================
#  pyprland.toml
#  ~/.config/hypr/pyprland.toml
#  https://hyprland-community.github.io/pyprland/
# ============================================================

[pyprland]
    plugins = ["scratchpads"]

[pyprland.variables]
    term_with_class = "kitty --class"

# ── Drop-down terminal ────────────────────────────────────
# Super+` to toggle — slides down from top
[scratchpads.console]
    animation = "fromTop"
    class     = "console-dropdown"
    command   = "kitty --class console-dropdown"
    size      = "75% 60%"
    max_size  = "90% 100%"
    margin    = 10

# ── Drop-down file manager ────────────────────────────────
# Super+F1 to toggle
[scratchpads.files]
    animation  = "fromTop"
    class      = "files-dropdown"
    command    = "kitty --class files-dropdown -e yazi"
    size       = "70% 65%"
    max_size   = "90% 100%"
    margin     = 10
    lazy       = true
