# =========================================================
# HYPRLOCK — v2.0
# Maple Mono NF throughout
# OLED-safe brightness
# Wallbash accent via $accent (updated by wallpaper-rotate.sh)
# Spaced out layout for 5120x1440
# =========================================================

$accent     = rgba(00f5ffff)
$accentFade = rgba(00f5ff44)
$accentGlow = rgba(00f5ff22)
$surface    = rgba(05050aee)
$surfaceHi  = rgba(0f0f1eee)
$text       = rgba(e8e8f0ff)
$subtext    = rgba(b0b0c099)
$danger     = rgba(ff3c6fff)

general {
    hide_cursor = false
    text_trim   = true
}

# =========================================================
# BACKGROUND — blurred screenshot, OLED-safe
# =========================================================
background {
    monitor           =
    path              = screenshot
    blur_passes       = 4
    blur_size         = 8
    noise             = 0.008
    contrast          = 0.85
    brightness        = 0.50
    vibrancy          = 0.15
    vibrancy_darkness = 0.10
}

# =========================================================
# PRIMARY — DP-2 (OLED ultrawide 5120x1440)
#
# Vertical layout from center (positive = up, negative = down)
#   +420  clock
#   +280  greeting
#   +230  date
#   +175  divider line
#   +60   card background
#   +60   user label
#   -20   password input
#   -110  buttons row
# =========================================================

# --- Clock ---
label {
    monitor       = DP-2
    text          = $TIME
    color         = $text
    font_size     = 140
    font_family   = Maple Mono NF Bold
    position      = 0, 420
    halign        = center
    valign        = center
    shadow_passes = 3
    shadow_size   = 16
    shadow_color  = rgba(00000090)
}

# --- Greeting ---
label {
    monitor     = DP-2
    text        = cmd[update:60000] hour=$(date +%H); if [ $hour -lt 12 ]; then echo "Good morning, William"; elif [ $hour -lt 17 ]; then echo "Good afternoon, William"; else echo "Good evening, William"; fi
    color       = $subtext
    font_size   = 22
    font_family = Maple Mono NF
    position    = 0, 280
    halign      = center
    valign      = center
}

# --- Date ---
label {
    monitor       = DP-2
    text          = cmd[update:60000] date '+%A, %B %d %Y'
    color         = $subtext
    font_size     = 26
    font_family   = Maple Mono NF
    position      = 0, 230
    halign        = center
    valign        = center
    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(00000060)
}

# --- Divider ---
shape {
    monitor  = DP-2
    size     = 560, 1
    color    = $accentFade
    rounding = 2
    position = 0, 175
    halign   = center
    valign   = center
}

# --- Card ---
shape {
    monitor       = DP-2
    size          = 560, 260
    color         = $surface
    rounding      = 28
    border_size   = 1
    border_color  = rgba(ffffff08)
    position      = 0, 10
    halign        = center
    valign        = center
    shadow_passes = 4
    shadow_size   = 32
    shadow_color  = rgba(00000070)
}

# --- User label ---
label {
    monitor     = DP-2
    text        =   $USER
    color       = $subtext
    font_size   = 18
    font_family = Maple Mono NF
    position    = 0, 80
    halign      = center
    valign      = center
}

# --- Password input ---
input-field {
    monitor           = DP-2
    size              = 440, 58
    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.32
    dots_center       = true
    dots_rounding     = -1

    outer_color       = $accent
    inner_color       = rgba(0a0a14dd)
    font_color        = $text
    font_family       = Maple Mono NF
    check_color       = $accent
    fail_color        = $danger
    fail_text         = <span foreground="##ff3c6f"> auth failed</span>
    capslock_color    = rgba(ffd166ff)
    numlock_color     = rgba(ffd166ff)

    fade_on_empty     = true
    fade_timeout      = 2000
    placeholder_text  = <span foreground="##888899">  enter password</span>
    hide_input        = false
    rounding          = 16

    position = 0, -20
    halign   = center
    valign   = center
    zindex   = 2

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(00000040)
}

# --- Buttons row ---

# Logout button
shape {
    monitor      = DP-2
    size         = 155, 48
    color        = rgba(1a1a2eee)
    border_size  = 1
    border_color = $accent
    rounding     = 16
    position     = -175, -110
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = hyprctl dispatch exit
}
label {
    monitor     = DP-2
    text        = 󰍃  Logout
    color       = $accent
    font_size   = 16
    font_family = Maple Mono NF
    position    = -175, -110
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = hyprctl dispatch exit
}

# Suspend button
shape {
    monitor      = DP-2
    size         = 155, 48
    color        = rgba(1a1a2eee)
    border_size  = 1
    border_color = rgba(ffffff20)
    rounding     = 16
    position     = 0, -110
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = systemctl suspend
}
label {
    monitor     = DP-2
    text        = 󰤄  Suspend
    color       = $text
    font_size   = 16
    font_family = Maple Mono NF
    position    = 0, -110
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = systemctl suspend
}

# Shutdown button
shape {
    monitor      = DP-2
    size         = 155, 48
    color        = rgba(2a0a0aee)
    border_size  = 1
    border_color = rgba(ff3c6f88)
    rounding     = 16
    position     = 175, -110
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = systemctl poweroff
}
label {
    monitor     = DP-2
    text        = ⏻  Shutdown
    color       = rgba(ff3c6fff)
    font_size   = 16
    font_family = Maple Mono NF
    position    = 175, -110
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = systemctl poweroff
}

# =========================================================
# SECONDARY — DP-3 (4K — ghost clock only, very subtle)
# =========================================================

label {
    monitor     = DP-3
    text        = $TIME
    color       = rgba(f0f0f512)
    font_size   = 110
    font_family = Maple Mono NF Bold
    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     = DP-3
    text        = cmd[update:60000] date '+%A, %B %d'
    color       = rgba(f0f0f50a)
    font_size   = 24
    font_family = Maple Mono NF
    position    = 0, -30
    halign      = center
    valign      = center
}
