# =========================================================
# HYPRLAND CONFIG — v2.0 (Rocko_DE)
# Main:  DP-2  5120x1440@240  OLED ultrawide
# Left:  DP-3  3840x2160@144  4K
# GPU:   RTX 4090 / Intel 14900K
# =========================================================

# -------------------------
# MONITORS
# -------------------------
monitor = DP-2, 5120x1440@240, auto, 1, bitdepth, 10, cm, hdredid, sdrbrightness, 1.15, sdrsaturation, 1.05, vrr, 2
monitor = DP-3, 3840x2160@144, auto-left, 1.25, bitdepth, 10, cm, hdredid, sdrbrightness, 1.20, sdrsaturation, 1.05, vrr, 2
monitor = , preferred, auto, 1

# -------------------------
# VARIABLES
# -------------------------
$mainMod     = SUPER
$terminal    = kitty
$fileManager = thunar
$menu        = ~/.config/hypr/scripts/rofilaunch.sh d
$browser     = firefox

# -------------------------
# ENVIRONMENT — NVIDIA / WAYLAND
# -------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# VRR / frame pacing
env = __GL_SYNC_TO_VBLANK,0
env = __GL_VRR_ALLOWED,1
env = __GL_GSYNC_ALLOWED,1
env = WLR_RENDERER_ALLOW_SOFTWARE,0
env = WLR_DRM_DEVICES,/dev/dri/card0

# Theming
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = GTK_THEME,catppuccin-mocha-blue-standard+default
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

# -------------------------
# AUTOSTART
# -------------------------
exec-once = systemctl --user start waybar.service
exec-once = systemctl --user start waybar-secondary.service
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swww-daemon
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = kdeconnect-indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = pypr
exec-once = ~/.config/hypr/scripts/wallpaper-rotate.sh

# Pywal color source — generated by wallpaper-rotate.sh
exec-once = touch ~/.config/wal/colors-hyprland.conf
source = ~/.config/wal/colors-hyprland.conf

# -------------------------
# INPUT
# -------------------------
input {
    kb_layout    = us
    follow_mouse = 2
    mouse_refocus = false
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# -------------------------
# CURSOR
# -------------------------
cursor {
    inactive_timeout = 5
    hide_on_key_press = true
    no_break_fs_vrr  = 2
    min_refresh_rate = 48
    no_warps         = true
}

# -------------------------
# GENERAL
# -------------------------
general {
    gaps_in          = 6
    gaps_out         = 12
    border_size      = 2
    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle

    col.active_border   = rgba(00f5ffee) rgba(ff2d6baa) 45deg
    col.inactive_border = rgba(1a1a2a66)
}

# -------------------------
# DECORATION
# -------------------------
decoration {
    rounding = 12

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        new_optimizations = true
        xray              = true
    }

    shadow {
        enabled       = true
        range         = 16
        render_power  = 3
        ignore_window = true
        color         = rgba(00000066)
    }

    dim_inactive  = true
    dim_strength  = 0.08
}

# -------------------------
# ANIMATIONS
# -------------------------
animations {
    enabled = true

    bezier = snap,      0.05, 0.9,  0.1,  1.05
    bezier = smooth,    0.4,  0.0,  0.2,  1.0
    bezier = bounce,    0.2,  1.6,  0.4,  1.0
    bezier = linear,    0.0,  0.0,  1.0,  1.0
    bezier = popIn,     0.1,  1.2,  0.3,  1.0
    bezier = slideOut,  0.4,  0.0,  1.0,  1.0

    animation = windowsIn,        1, 4, popIn,    popin 70%
    animation = windowsOut,       1, 3, slideOut, popin 80%
    animation = windowsMove,      1, 4, smooth
    animation = border,           1, 6, linear
    animation = borderangle,      1, 60, linear,  loop
    animation = fadeIn,           1, 4, smooth
    animation = fadeOut,          1, 3, smooth
    animation = fadeLayers,       1, 3, smooth
    animation = fadeSwitch,       1, 4, smooth
    animation = workspaces,       1, 4, bounce,   slide
    animation = specialWorkspace, 1, 4, smooth,   slidevert
}

# -------------------------
# LAYOUTS
# -------------------------
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = slave
}

# -------------------------
# RENDER
# -------------------------
render {
    cm_fs_passthrough = 2
    cm_auto_hdr       = 1
}

# -------------------------
# MISC
# -------------------------
misc {
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    vfr                       = true
    render_unfocused_fps      = 60
    mouse_move_enables_dpms   = true
    key_press_enables_dpms    = true
    focus_on_activate         = false
    initial_workspace_tracking = 1
    background_color          = 0xff000000
}

# =========================================================
# KEYBINDS
# =========================================================

# --- Core ---
bind = $mainMod,       T,      exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod SHIFT, E,      exec, kitty -e yazi
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       Q,      killactive
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       P,      pseudo
bind = $mainMod,       F,      fullscreen, 1
bind = $mainMod SHIFT, F,      fullscreen, 0
bind = $mainMod,       O,      exec, hyprlock

# --- Rofi ---
bind = $mainMod,       R,      exec, ~/.config/hypr/scripts/rofilaunch.sh d
bind = $mainMod,       TAB,    exec, ~/.config/hypr/scripts/rofilaunch.sh w
bind = $mainMod SHIFT, R,      exec, ~/.config/hypr/scripts/rofilaunch.sh f
bind = $mainMod,       C,      exec, ~/.config/hypr/scripts/rofilaunch.sh c

# --- Pyprland scratchpads ---
bind = $mainMod, grave, exec, pypr toggle console
bind = $mainMod, F1,    exec, pypr toggle files

# --- Waybar ---
bind = $mainMod,       W,      exec, ~/.config/hypr/scripts/toggle-waybar.sh
bind = $mainMod SHIFT, W,      exec, ~/.config/hypr/scripts/wallpaper-rotate.sh next

# --- Notifications ---
bind = $mainMod,       N,      exec, swaync-client -t
bind = $mainMod SHIFT, N,      exec, swaync-client -d
bind = $mainMod CTRL,  N,      exec, swaync-client -rs

# --- Misc ---
bind = $mainMod,       period, exec, ~/.config/hypr/scripts/emoji-picker.sh
bind = $mainMod,       slash,  exec, ~/.config/hypr/scripts/keybind-cheatsheet.sh
bind = $mainMod SHIFT, P,      exec, ~/.config/hypr/scripts/wallpaper-picker.sh
bind = $mainMod SHIFT CTRL, M, exit

# --- Focus (vim-style) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Move windows ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- Resize ---
binde = $mainMod ALT, H, resizeactive, -40 0
binde = $mainMod ALT, L, resizeactive,  40 0
binde = $mainMod ALT, K, resizeactive,  0 -40
binde = $mainMod ALT, J, resizeactive,  0  40

# --- Workspaces: switch ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# --- Workspaces: move window ---
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9

# --- Workspaces: move window silently ---
bind = $mainMod SHIFT CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT CTRL, 9, movetoworkspacesilent, 9

# --- Mouse ---
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# --- Audio ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous

# --- Screenshots ---
bind = ,       Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send -i camera "Screenshot" "Copied to clipboard" -t 2000
bind = SHIFT,  Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = CTRL,   Print, exec, grim - | wl-copy && notify-send -i camera "Screenshot" "Full screen copied" -t 2000
bind = ALT,    Print, exec, FILE=~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && grim $FILE && notify-send -i camera "Screenshot saved" "$FILE" -t 3000

# --- Gaming: toggle secondary monitor ---
bind = $mainMod SHIFT, F1, exec, hyprctl keyword monitor "DP-3,disable"
bind = $mainMod SHIFT, F2, exec, hyprctl keyword monitor "DP-3,3840x2160@144,auto-left,1.25,bitdepth,10,cm,hdredid,sdrbrightness,1.20,sdrsaturation,1.05,vrr,2"

# =========================================================
# WINDOW RULES
# =========================================================

windowrule = float        class:^(pavucontrol)$
windowrule = center       class:^(pavucontrol)$
windowrule = size 900 700 class:^(pavucontrol)$

windowrule = float  class:^(nm-connection-editor)$
windowrule = center class:^(nm-connection-editor)$

windowrule = float  class:^(polkit-kde-authentication-agent-1)$
windowrule = center class:^(polkit-kde-authentication-agent-1)$

windowrule = float        class:^(blueman-manager)$
windowrule = center       class:^(blueman-manager)$
windowrule = size 700 500 class:^(blueman-manager)$

windowrule = opacity 0.92 0.85 class:^(kitty)$

windowrule = float         class:^(thunar)$
windowrule = center        class:^(thunar)$
windowrule = size 1200 800 class:^(thunar)$

windowrule = no_anim on match:class ^(steam)$
windowrule = no_blur on match:class ^(steam)$
windowrule = no_dim on  match:class ^(steam)$
windowrule = opaque on  match:class ^(steam)$
windowrule = immediate  class:^(steam_app_\d+)$

windowrule = opacity 0.94 0.88 class:^(discord)$

windowrule = float            title:^(Picture-in-Picture)$
windowrule = pin              title:^(Picture-in-Picture)$
windowrule = size 640 360     title:^(Picture-in-Picture)$
windowrule = move 100%-660 55 title:^(Picture-in-Picture)$
windowrule = no_dim on        match:title ^(Picture-in-Picture)$

windowrule = float class:^(rofi)$
windowrule = center class:^(rofi)$

windowrule = float class:^(console-dropdown)$
windowrule = center class:^(console-dropdown)$
windowrule = float class:^(files-dropdown)$
windowrule = center class:^(files-dropdown)$

windowrule = float class:^(kdeconnect.*)$

# =========================================================
# PER-APP WORKSPACE RULES
# =========================================================
windowrule = workspace 1 class:^(firefox)$
windowrule = workspace 1 class:^(chromium)$
windowrule = workspace 1 class:^(kitty)$
windowrule = workspace 2 class:^(discord)$
windowrule = workspace 3 class:^(steam)$
windowrule = workspace 3 class:^(steam_app_\d+)$

# =========================================================
# WORKSPACES
# =========================================================
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2

workspace = 7, monitor:DP-3, default:true
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3

workspace = special:scratch, on-created-empty:$terminal
