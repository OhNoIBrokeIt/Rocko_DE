# ============================================================
#  Hyprland — OLED + HDR + VRR tuning
#  Add/merge into ~/.config/hypr/hyprland.conf
# ============================================================

# ── Monitors ─────────────────────────────────────────────
# vrr,2 = adaptive sync fullscreen only (safest for OLED + VRR)
# sdrbrightness = SDR content brightness multiplier in HDR mode
# sdrsaturation = slight saturation boost for SDR in HDR mode
# cm,hdredid     = use monitor's native HDR EDID profile
monitor = DP-2, 5120x1440@240, auto, 1, bitdepth, 10, cm, hdredid, sdrbrightness, 1.15, sdrsaturation, 1.05, vrr, 2
monitor = DP-3, 3840x2160@144, auto-left, 1.25, bitdepth, 10, cm, hdredid, sdrbrightness, 1.20, sdrsaturation, 1.05, vrr, 2

# ── General decoration ───────────────────────────────────
decoration {
    rounding = 12

    # OLED: keep active_opacity at 1.0 — partial transparency
    # causes compositor to blend layers which can increase
    # static pixel stress in fixed UI positions
    active_opacity   = 1.0
    inactive_opacity = 0.96

    # Dim inactive windows slightly — helps OLED by reducing
    # the number of fully-lit pixels on secondary content
    dim_inactive  = true
    dim_strength  = 0.08

    blur {
        enabled       = true
        size          = 8
        passes        = 2
        new_optimizations = true
        # Keep blur on for aesthetics but limit passes
        # Excessive blur = more GPU work = more heat near OLED panel
        xray          = false
        ignore_opacity = true
    }

    shadow {
        enabled  = true
        range    = 12
        render_power = 3
        color    = rgba(00000055)
    }
}

# ── Misc ─────────────────────────────────────────────────
misc {
    # Auto HDR for SDR content
    cm_auto_hdr = 1

    # VRR: don't break out of VRR on fullscreen window change
    no_break_fs_vrr = 2

    # Disable splash — one less static rendered element on OLED
    disable_hyprland_logo  = true
    disable_splash_rendering = true

    # Force default wallpaper off — let swww handle it
    force_default_wallpaper = 0

    # Background color when no wallpaper is set — pure black
    # is the only safe default for OLED (pixels fully off)
    background_color = 0xff000000
}

# ── Animations ───────────────────────────────────────────
# Faster animations reduce the time pixels spend in
# intermediate states (partially lit) which matters for OLED
animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5, 1
    bezier = overshot,  0.05, 0.9, 0.1, 1.05

    animation = windows,     1, 4, overshot, slide
    animation = windowsOut,  1, 3, smoothOut, slide
    animation = windowsMove, 1, 3, smoothIn
    animation = fade,        1, 3, smoothIn
    animation = fadeDim,     1, 3, smoothIn
    animation = workspaces,  1, 4, overshot, slidevert
}
