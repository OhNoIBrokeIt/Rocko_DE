# =========================================================
# KEYBINDS — Rocko_DE v2.0
# Pattern: Super+<key> = action, Super+Shift+<key> = variant
# Super+/ to open this cheatsheet in rofi
# =========================================================

# ── Applications ─────────────────────────────────────────
bind = $mainMod,       T,      exec,           $terminal                                    # Launch terminal (kitty)
bind = $mainMod,       E,      exec,           $fileManager                                 # Launch file manager (thunar)
bind = $mainMod SHIFT, E,      exec,           kitty -e yazi                                # Launch terminal file manager (yazi)
bind = $mainMod,       B,      exec,           $browser                                     # Launch browser (firefox)

# ── Window Management ────────────────────────────────────
bind = $mainMod,       Q,      killactive,                                                  # Close focused window
bind = $mainMod SHIFT, Q,      exit,                                                        # Exit Hyprland session
bind = $mainMod,       V,      togglefloating,                                              # Toggle floating window
bind = $mainMod,       G,      togglegroup,                                                 # Toggle window group/tab
bind = $mainMod,       F,      fullscreen,     1                                            # Toggle fullscreen (maximized)
bind = $mainMod SHIFT, F,      fullscreen,     0                                            # Toggle fullscreen (true)
bind = $mainMod,       P,      pseudo,                                                      # Toggle pseudo-tiling

# ── Rofi Launcher ────────────────────────────────────────
bind = $mainMod,       R,      exec,           ~/.config/hypr/scripts/rofilaunch.sh d       # App launcher (drun)
bind = $mainMod,       TAB,    exec,           ~/.config/hypr/scripts/rofilaunch.sh w       # Window switcher
bind = $mainMod SHIFT, R,      exec,           ~/.config/hypr/scripts/rofilaunch.sh f       # File browser
bind = $mainMod,       C,      exec,           ~/.config/hypr/scripts/rofilaunch.sh c       # Clipboard history

# ── Scratchpads ──────────────────────────────────────────
bind = $mainMod,       grave,  exec,           pypr toggle console                          # Drop-down terminal (Super+`)
bind = $mainMod,       F1,     exec,           pypr toggle files                            # Drop-down file manager (yazi)

# ── System ───────────────────────────────────────────────
bind = $mainMod,       L,      exec,           hyprlock                                     # Lock screen
bind = $mainMod,       slash,  exec,           ~/.config/hypr/scripts/keybind-cheatsheet.sh # Keybind cheatsheet
bind = $mainMod,       period, exec,           ~/.config/hypr/scripts/emoji-picker.sh       # Emoji picker

# ── Waybar / Wallpaper ───────────────────────────────────
bind = $mainMod CTRL,  W,      exec,           ~/.config/hypr/scripts/toggle-waybar.sh      # Toggle primary waybar
bind = $mainMod SHIFT, W,      exec,           ~/.config/hypr/scripts/wallpaper-rotate.sh next  # Rotate wallpaper
bind = $mainMod SHIFT, P,      exec,           ~/.config/hypr/scripts/wallpaper-picker.sh   # Pick wallpaper

# ── Notifications ────────────────────────────────────────
bind = $mainMod,       N,      exec,           swaync-client -t                             # Toggle notification panel
bind = $mainMod SHIFT, N,      exec,           swaync-client -d                             # Toggle do not disturb
bind = $mainMod CTRL,  N,      exec,           swaync-client -rs                            # Reload swaync style

# ── Focus — Vim keys ─────────────────────────────────────
bind = $mainMod,       H,      movefocus,      l                                            # Focus left
bind = $mainMod,       L,      movefocus,      r                                            # Focus right
bind = $mainMod,       K,      movefocus,      u                                            # Focus up
bind = $mainMod,       J,      movefocus,      d                                            # Focus down

# ── Focus — Arrow keys ───────────────────────────────────
bind = $mainMod,       left,   movefocus,      l                                            # Focus left
bind = $mainMod,       right,  movefocus,      r                                            # Focus right
bind = $mainMod,       up,     movefocus,      u                                            # Focus up
bind = $mainMod,       down,   movefocus,      d                                            # Focus down

# ── Focus — Cycle ────────────────────────────────────────
bind = ALT,            Tab,    cyclenext,                                                   # Cycle focus to next window

# ── Move Windows ─────────────────────────────────────────
bind = $mainMod SHIFT, H,      movewindow,     l                                            # Move window left
bind = $mainMod SHIFT, L,      movewindow,     r                                            # Move window right
bind = $mainMod SHIFT, K,      movewindow,     u                                            # Move window up
bind = $mainMod SHIFT, J,      movewindow,     d                                            # Move window down

# ── Resize Windows ───────────────────────────────────────
binde = $mainMod ALT,  H,      resizeactive,   -40 0                                        # Resize window left
binde = $mainMod ALT,  L,      resizeactive,    40 0                                        # Resize window right
binde = $mainMod ALT,  K,      resizeactive,    0 -40                                       # Resize window up
binde = $mainMod ALT,  J,      resizeactive,    0  40                                       # Resize window down

# ── Workspaces — Switch ──────────────────────────────────
bind = $mainMod,       1,      workspace,      1                                            # Switch to workspace 1
bind = $mainMod,       2,      workspace,      2                                            # Switch to workspace 2
bind = $mainMod,       3,      workspace,      3                                            # Switch to workspace 3
bind = $mainMod,       4,      workspace,      4                                            # Switch to workspace 4
bind = $mainMod,       5,      workspace,      5                                            # Switch to workspace 5
bind = $mainMod,       6,      workspace,      6                                            # Switch to workspace 6
bind = $mainMod,       7,      workspace,      7                                            # Switch to workspace 7
bind = $mainMod,       8,      workspace,      8                                            # Switch to workspace 8
bind = $mainMod,       9,      workspace,      9                                            # Switch to workspace 9

# ── Workspaces — Move Window ─────────────────────────────
bind = $mainMod CTRL,  1,      movetoworkspace, 1                                           # Move window to workspace 1
bind = $mainMod CTRL,  2,      movetoworkspace, 2                                           # Move window to workspace 2
bind = $mainMod CTRL,  3,      movetoworkspace, 3                                           # Move window to workspace 3
bind = $mainMod CTRL,  4,      movetoworkspace, 4                                           # Move window to workspace 4
bind = $mainMod CTRL,  5,      movetoworkspace, 5                                           # Move window to workspace 5
bind = $mainMod CTRL,  6,      movetoworkspace, 6                                           # Move window to workspace 6
bind = $mainMod CTRL,  7,      movetoworkspace, 7                                           # Move window to workspace 7
bind = $mainMod CTRL,  8,      movetoworkspace, 8                                           # Move window to workspace 8
bind = $mainMod CTRL,  9,      movetoworkspace, 9                                           # Move window to workspace 9

# ── Workspaces — Move Window Silently ────────────────────
bind = $mainMod SHIFT CTRL, 1, movetoworkspacesilent, 1                                     # Move window silently to workspace 1
bind = $mainMod SHIFT CTRL, 2, movetoworkspacesilent, 2                                     # Move window silently to workspace 2
bind = $mainMod SHIFT CTRL, 3, movetoworkspacesilent, 3                                     # Move window silently to workspace 3
bind = $mainMod SHIFT CTRL, 4, movetoworkspacesilent, 4                                     # Move window silently to workspace 4
bind = $mainMod SHIFT CTRL, 5, movetoworkspacesilent, 5                                     # Move window silently to workspace 5
bind = $mainMod SHIFT CTRL, 6, movetoworkspacesilent, 6                                     # Move window silently to workspace 6
bind = $mainMod SHIFT CTRL, 7, movetoworkspacesilent, 7                                     # Move window silently to workspace 7
bind = $mainMod SHIFT CTRL, 8, movetoworkspacesilent, 8                                     # Move window silently to workspace 8
bind = $mainMod SHIFT CTRL, 9, movetoworkspacesilent, 9                                     # Move window silently to workspace 9

# ── Mouse ────────────────────────────────────────────────
bind  = $mainMod,      mouse_down, workspace,  e+1                                          # Scroll to next workspace
bind  = $mainMod,      mouse_up,   workspace,  e-1                                          # Scroll to previous workspace
bindm = $mainMod,      mouse:272,  movewindow,                                              # Hold to drag window
bindm = $mainMod,      mouse:273,  resizewindow,                                            # Hold to resize window

# ── Audio ─────────────────────────────────────────────────
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+             # Volume up
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-             # Volume down
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle            # Toggle mute
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle          # Toggle mic mute
bind  = , XF86AudioPlay,        exec, playerctl play-pause                                  # Play/pause media
bind  = , XF86AudioNext,        exec, playerctl next                                        # Next track
bind  = , XF86AudioPrev,        exec, playerctl previous                                    # Previous track

# ── Screenshots ──────────────────────────────────────────
bind = ,       Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send -i camera "Screenshot" "Copied to clipboard" -t 2000  # Area screenshot → clipboard
bind = SHIFT,  Print, exec, grim -g "$(slurp)" - | swappy -f -                              # Area screenshot → annotate
bind = CTRL,   Print, exec, grim - | wl-copy && notify-send -i camera "Screenshot" "Full screen copied" -t 2000                  # Full screen → clipboard
bind = ALT,    Print, exec, FILE=~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && grim $FILE && notify-send -i camera "Screenshot saved" "$FILE" -t 3000  # Full screen → save file

# ── Gaming ───────────────────────────────────────────────
bind = $mainMod ALT,   G,      exec,           ~/.config/hypr/scripts/gamemode.sh           # Toggle game mode (effects off + wallpaper paused)
bind = $mainMod SHIFT, F1,     exec,           hyprctl keyword monitor "DP-3,disable"       # Disable secondary monitor (DP-3)
bind = $mainMod SHIFT, F2,     exec,           hyprctl keyword monitor "DP-3,3840x2160@144,auto-left,1.25,bitdepth,10,cm,hdredid,sdrbrightness,1.20,sdrsaturation,1.05,vrr,2"  # Re-enable secondary monitor (DP-3)
