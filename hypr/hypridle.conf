general {
    lock_cmd            = pidof hyprlock || hyprlock
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on && sleep 1 && hyprctl dispatch focuswindow address:$(hyprctl activewindow -j | python3 -c "import sys,json; print(json.load(sys.stdin)['address'])" 2>/dev/null) 2>/dev/null || true
    ignore_dbus_inhibit = false
}

# ── 2 min: dim waybar to near-invisible ──────────────────
# Reduces static pixel stress on OLED from the bar sitting
# at fixed positions. SIGUSR2 reloads CSS — we swap to a
# dimmed style, then restore on resume.
listener {
    timeout    = 120
    on-timeout = pkill -SIGUSR2 waybar
    on-resume  = pkill -SIGUSR2 waybar
}

# ── 3 min: kill screensaver inhibitors, dim brightness ───
# brightnessctl only affects SDR brightness level —
# on OLED this reduces backlight intensity, not just gamma
listener {
    timeout    = 180
    on-timeout = brightnessctl -s set 15%
    on-resume  = brightnessctl -r
}

# ── 4 min: lock screen ───────────────────────────────────
listener {
    timeout    = 240
    on-timeout = loginctl lock-session
}

# ── 5 min: monitors off (DPMS) ───────────────────────────
# Shorter than before (was 6 min) — OLED panels benefit
# from powering off pixels sooner rather than dimming
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on && sleep 0.5 && hyprctl dispatch bringactivetotop
}

# ── 20 min: suspend ──────────────────────────────────────
# Reduced from 30 min — better for OLED longevity
listener {
    timeout    = 1200
    on-timeout = systemctl suspend
}
